name: Secret Lair data refresh

on:
  workflow_dispatch:
  schedule:
    # MTGJSON and TCGCSV have had time to publish their daily builds.
    - cron: '30 15 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: secret-lair-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Fetch and reconcile Secret Lair sources
        run: |
          node scripts/sl-build/fetch-sources.js
          node scripts/sl-build/reconcile.js
          node scripts/sl-build/emit-secretlair.js
          node scripts/sl-build/smoke-secretlair.js

      - name: Refresh reviewed SL-only history seed (weekly or manual)
        shell: bash
        run: |
          if [ "$(date -u +%u)" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/sl-build/extract-price-seed.js
          else
            echo "Skipping the large AllPrices build input today; the reviewed seed refreshes Sundays."
          fi

      - name: Run unit tests
        run: npm test

      - name: Upload reconciliation report
        uses: actions/upload-artifact@v4
        with:
          name: secret-lair-reconciliation-${{ github.run_id }}
          path: scripts/sl-build/out/report.md
          if-no-files-found: error

      - name: Commit routine data changes; open a PR only when the refresh looks anomalous
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- src/renderer/secretlair.js src/renderer/sl-price-seed.json; then
            echo "The baked Secret Lair baseline and history seed are already current."
            exit 0
          fi
          git config user.name "mana-ledger-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Anomaly guard: shrinking data or a wholesale rewrite of the baseline
          # means an upstream source regressed — route that to a reviewed PR
          # instead of auto-committing. Guard-script crashes count as anomalous.
          mkdir -p /tmp/sl-guard
          git show HEAD:src/renderer/secretlair.js > /tmp/sl-guard/old-secretlair.js
          git show HEAD:src/renderer/sl-price-seed.json > /tmp/sl-guard/old-seed.json
          verdict=0
          guard_output="$(node scripts/sl-build/guard-baseline.js \
            /tmp/sl-guard/old-secretlair.js /tmp/sl-guard/old-seed.json \
            src/renderer/secretlair.js src/renderer/sl-price-seed.json 2>&1)" || verdict=$?
          echo "$guard_output"
          churn=$(git diff --numstat -- src/renderer/secretlair.js | awk '{print $1 + $2}')
          total=$(wc -l < src/renderer/secretlair.js)
          if [ "${churn:-0}" -gt $(( total / 4 )) ]; then
            verdict=1
            guard_output="$guard_output
          - secretlair.js changed ${churn} lines of ${total} — too much churn to auto-merge"
          fi

          if [ "$verdict" -eq 0 ]; then
            git add src/renderer/secretlair.js src/renderer/sl-price-seed.json
            git commit -m "data: refresh Secret Lair baseline and history seed"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "Routine refresh committed directly to ${GITHUB_REF_NAME}."
            exit 0
          fi

          branch="automation/secret-lair-data"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git switch -C "$branch"
          git add src/renderer/secretlair.js src/renderer/sl-price-seed.json
          git commit -m "data: refresh Secret Lair baseline and history seed"
          git push --force-with-lease --set-upstream origin "$branch"
          existing="$(gh pr list --base "${GITHUB_REF_NAME}" --head "$branch" --state open --json number --jq '.[0].number // empty')"
          body="This refresh tripped the anomaly guard, so it was NOT auto-merged:

          ${guard_output}

          Compare against the reconciliation report attached to workflow run ${GITHUB_RUN_ID} before merging — a shrink usually means an upstream source (MTGJSON, Scryfall, mtg.wiki) shipped a bad build, in which case close this PR and let a later refresh supersede it."
          if [ -z "$existing" ]; then
            gh pr create \
              --base "${GITHUB_REF_NAME}" \
              --head "$branch" \
              --title "data: review anomalous Secret Lair refresh" \
              --body "$body"
          else
            gh pr comment "$existing" --body "$body"
          fi
