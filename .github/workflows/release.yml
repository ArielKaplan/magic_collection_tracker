name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22: better-sqlite3 ships prebuilt binaries for it (Node 24 has
          # none, so it falls back to a from-source node-gyp build that needs
          # Python/VS on the runner and fails).
          node-version: 22
          cache: npm

      # …but use npm 11 to read the lockfile. package-lock.json is generated by
      # the local npm 11 toolchain (release.js regenerates it every release);
      # Node 22's bundled npm 10 rejects npm 11's optional-dependency format
      # (esbuild's platform packages, pulled in by vitest). npm version is
      # independent of Node's native ABI, so this keeps the prebuild AND the
      # lockfile happy.
      - name: Use npm 11 (match the lockfile toolchain)
        run: npm i -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build & publish installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip electron-builder's own update check (CI noise)
          USE_HARD_LINKS: false

      # electron-builder publishes the release with an empty body; fill it from
      # the matching CHANGELOG.md section so the in-app "What's New" has content.
      - name: Set release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          node scripts/extract-changelog.js $version notes.md
          if ($LASTEXITCODE -eq 0) {
            gh release edit "${{ github.ref_name }}" --notes-file notes.md
            Write-Host "Set release notes for $version from CHANGELOG.md"
          } else {
            Write-Host "No CHANGELOG entry for $version - leaving release notes unchanged."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
