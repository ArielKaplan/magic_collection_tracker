<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Lair Tracker</title>
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand" title="Secret Lair Tracker">🃏</div>
    <nav class="sidebar-nav">
      <button class="tab-btn active" data-tab="dashboard" title="Dashboard (Ctrl+1)">
        <span class="tab-icon">📊</span><span class="tab-label">Dashboard</span>
      </button>
      <button class="tab-btn" data-tab="cards" title="Cards (Ctrl+2)">
        <span class="tab-icon">🃏</span><span class="tab-label">Cards</span>
      </button>
      <button class="tab-btn" data-tab="sealed" title="Sealed Product (Ctrl+3)">
        <span class="tab-icon">📦</span><span class="tab-label">Sealed</span>
      </button>
      <button class="tab-btn" data-tab="gallery" title="Gallery (Ctrl+4)">
        <span class="tab-icon">🖼️</span><span class="tab-label">Gallery</span>
      </button>
      <button class="tab-btn" data-tab="slviewer" title="Secret Lair (Ctrl+5)">
        <span class="tab-icon">✨</span><span class="tab-label">Lair</span>
      </button>
      <button class="tab-btn" data-tab="failures" id="failuresTab" title="Failed Lookups (Ctrl+6)">
        <span class="tab-icon">⚠</span><span class="tab-label">Issues</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="tab-btn" id="sidebarSettings" title="Settings (Ctrl+,)">
        <span class="tab-icon">⚙</span><span class="tab-label">Settings</span>
      </button>
    </div>
  </aside>

  <main id="content"></main>

  <footer class="status-bar">
    <span class="sb-section" id="sb-cards">— cards</span>
    <span class="sb-divider"></span>
    <span class="sb-section" id="sb-value">$—</span>
    <span class="sb-divider"></span>
    <span class="sb-section" id="sb-refresh">Last refresh: —</span>
    <span class="sb-section sb-spacer"></span>
    <span class="sb-section" id="sb-issues" style="display:none"></span>
    <span class="sb-divider"></span>
    <span class="sb-section sb-status" id="autosave-status"></span>
  </footer>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="secretlair.js"></script>
  <script src="app.js"></script>
</body>
</html>
