<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Lair Tracker</title>
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dist/svelte-app.css">
</head>
<body class="app-shell">
  <header class="topbar">
    <div class="topbar-brand" title="Secret Lair Tracker">🃏</div>
    <nav class="topbar-nav">
      <button class="tab-btn active" data-tab="dashboard" title="Dashboard (Ctrl+1)">Dashboard</button>
      <button class="tab-btn" data-tab="cards" title="Card Collection (Ctrl+2)">Card Collection</button>
      <button class="tab-btn" data-tab="sealed" title="Sealed Collection (Ctrl+3)">Sealed Collection</button>
      <button class="tab-btn" data-tab="decks" title="Decks (Ctrl+7)">Decks</button>
      <button class="tab-btn" data-tab="gallery" title="Gallery (Ctrl+4)">Gallery</button>
      <button class="tab-btn" data-tab="slviewer" title="Secret Lair Explorer (Ctrl+5)">Secret Lair Explorer</button>
      <button class="tab-btn" data-tab="failures" id="failuresTab" title="Failed Lookups (Ctrl+6)">Failed Lookups</button>
    </nav>
    <div class="topbar-actions">
      <button class="update-pill" id="update-pill" style="display:none"></button>
      <button class="topbar-btn" id="sidebarSettings" title="Settings (Ctrl+,)">⚙</button>
    </div>
  </header>

  <div class="ticker-tape" id="ticker-tape" aria-label="Card price ticker"></div>

  <main id="content"></main>

  <footer class="status-bar">
    <span class="sb-section" id="sb-cards">— cards</span>
    <span class="sb-divider"></span>
    <span class="sb-section" id="sb-value">$—</span>
    <span class="sb-divider"></span>
    <span class="sb-section" id="sb-refresh">Last refresh: —</span>
    <span class="sb-section sb-spacer"></span>
    <span class="sb-section" id="sb-issues" style="display:none"></span>
    <span class="sb-divider"></span>
    <span class="sb-section sb-logs" id="sb-logs" title="Activity Log (Ctrl+L)">
      ⓘ Logs <span class="sb-logs-count" id="sb-logs-count" style="display:none"></span>
    </span>
    <span class="sb-divider"></span>
    <span class="sb-section sb-status" id="autosave-status"></span>
  </footer>

  <aside id="logs-panel" class="logs-panel">
    <header class="logs-head">
      <span class="logs-title">Activity Log</span>
      <button class="logs-btn-sm" id="logs-clear" title="Clear all entries">Clear</button>
      <button class="logs-btn-sm" id="logs-close" title="Close (Ctrl+L)">✕</button>
    </header>
    <div class="logs-body" id="logs-body"></div>
  </aside>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="card-hover-preview" class="card-hover-preview"></div>

  <script src="secretlair.js"></script>
  <script type="module" src="dist/app-main.js"></script>
  <script type="module" src="dist/svelte-app.js"></script>
</body>
</html>
